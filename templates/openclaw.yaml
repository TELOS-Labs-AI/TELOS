  - "curl"
  - "wget"
  - "netcat"
  - "nc "
  - "exfiltrate"
  - "api_key"
  - "api key"
  - "token"
  - "secret"
  - "password"
  - "credential"
  - ".env"
  - "ssh_key"
  - "private_key"
  - "rm -rf"
  - "dd if="
  - "mkfs"
  - "ignore previous"
  - "forget your instructions"
  - "bypass"
  - "override security"
  - "install skill"
  - "clawHub"

