# -- Tool Definitions --
# Mapped from OpenClaw's 10 tool groups. Risk levels follow the
# Russell governance theory tier mapping (M0 convergence point C3).

tools:
  # group:fs -- File System (HIGH risk)
  - name: fs_read_file
    description: "Read the contents of a file in the workspace or governed project, such as reading SOUL.md for identity, MEMORY.md for session continuity, source code for review, configuration files, or governance templates"
    risk_level: low
  - name: fs_write_file
    description: "Write content to a new or existing file in the workspace, such as writing daily memory logs, analysis documents, handoff state, proposals, content drafts, or configuration updates"
    risk_level: medium
  - name: fs_edit_file
    description: "Edit an existing file by applying targeted modifications, such as updating workspace notes, appending test results to logs, fixing source code, or updating configuration values"
    risk_level: medium
  - name: fs_delete_file
    description: "Delete a file from the project workspace, such as removing temporary files, cleaning build artifacts, or deleting outdated test fixtures"
    risk_level: high
  - name: fs_list_directory
    description: "List files and directories in the workspace or governed project, such as viewing workspace/memory/ contents, checking file structure, or exploring project layout"
    risk_level: low
  - name: fs_search_files
    description: "Search file contents for patterns using regex or text matching, such as finding TODO comments, locating function definitions, or searching for import references"
    risk_level: low
  - name: fs_apply_patch
    description: "Apply a unified diff patch to one or more files in the workspace, such as applying code review suggestions, merging upstream changes, or applying formatting fixes"
    risk_level: medium
  - name: fs_move_file
    description: "Move or rename a file within the project workspace, such as reorganizing modules into subdirectories, renaming for clarity, or moving tests to the correct folder"
    risk_level: medium

  # group:runtime -- Shell Execution (CRITICAL risk)
  - name: runtime_execute
    description: "Execute a shell command such as git log, git status, git diff, pytest for test execution, ls/cat/head/tail/wc for file inspection, python3 for script execution, ps for process management, or tail/grep for audit trail analysis"
    risk_level: critical
  - name: runtime_process
    description: "Start, stop, or manage background processes, such as running a development server, stopping a hung test runner, or managing a file watcher process"
    risk_level: critical

  # group:web -- Web/Network (HIGH risk)
  - name: web_navigate
    description: "Navigate a browser to a URL and retrieve the page content, such as opening documentation pages, viewing GitHub pull requests, or loading API reference pages"
    risk_level: medium
  - name: web_fetch
    description: "Make an HTTP request to retrieve data from a URL, such as fetching documentation, checking API endpoints, downloading reference files, or performing health checks"
    risk_level: medium
  - name: web_scrape
    description: "Extract structured data from a web page using selectors, such as pulling release notes, extracting version numbers, or collecting documentation headings"
    risk_level: medium
  - name: web_search
    description: "Search the web using a search engine query, such as looking up error messages, finding library documentation, or researching AI governance references"
    risk_level: low

  # group:messaging -- External Communication (CRITICAL risk)
  - name: messaging_send
    description: "Send a message via configured messaging platform such as replying to JB in webchat, posting status updates to team channels, or sending governance event notifications"
    risk_level: high
  - name: messaging_read
    description: "Read messages from a configured messaging channel, such as checking for recent updates, reading deployment notifications, or reviewing feedback"
    risk_level: medium
  - name: messaging_reply
    description: "Reply to a specific message in a messaging channel, such as responding to questions, acknowledging notifications, or providing analysis results"
    risk_level: high

  # group:automation -- Scheduled Tasks (CRITICAL risk)
  - name: automation_cron_create
    description: "Create a new scheduled task (cron job) to execute actions at specified intervals, such as scheduling nightly test runs or configuring periodic health checks"
    risk_level: critical
  - name: automation_cron_list
    description: "List all configured scheduled tasks, such as viewing active cron jobs, reviewing scheduled automation, or auditing automation history"
    risk_level: low
  - name: automation_cron_delete
    description: "Delete an existing scheduled task, such as removing an obsolete job or cleaning up test automation entries"
    risk_level: medium
  - name: automation_gateway_config
    description: "Modify the OpenClaw gateway configuration including port, auth, and access settings"
    risk_level: critical

  # group:sessions -- Session Management (LOW risk)
  - name: sessions_save
    description: "Save the current agent session state for later resumption, such as persisting progress before compaction or checkpointing before a risky operation"
    risk_level: low
  - name: sessions_restore
    description: "Restore a previously saved agent session state, such as resuming work from a previous day or recovering context after a restart"
    risk_level: low
  - name: sessions_list
    description: "List available saved sessions, such as viewing checkpointed sessions or finding a previous session by name"
    risk_level: low
  - name: sessions_delete
    description: "Delete a saved session, such as cleaning up old checkpoints or removing completed task sessions"
    risk_level: low

  # group:memory -- Agent Memory (LOW risk)
  - name: memory_store
    description: "Store knowledge in the agent's persistent memory graph, such as saving project conventions, recording learnings, or caching configuration values for future reference"
    risk_level: low
  - name: memory_retrieve
    description: "Retrieve knowledge from the agent's persistent memory, such as looking up stored conventions, fetching cached configuration, or recalling previous analysis results"
    risk_level: low
  - name: memory_search
    description: "Search the agent's persistent memory using semantic or keyword queries, such as finding stored conventions, searching for debugging notes, or locating cached endpoints"
    risk_level: low

  # group:ui -- User Interface (LOW risk)
  - name: ui_display
    description: "Display formatted output to the user including text, tables, and code blocks, such as showing test results, rendering diffs, or presenting analysis summaries"
    risk_level: low
  - name: ui_prompt
    description: "Prompt the user for input or confirmation, such as asking for approval before proceeding, requesting clarification, or confirming a destructive operation"
    risk_level: low

  # group:nodes -- Agent Orchestration (MEDIUM risk)
  - name: nodes_delegate
    description: "Delegate a sub-task to another configured agent with specified scope and permissions, such as assigning analysis to a research sub-agent or handing off code review to a specialized agent"
    risk_level: high
  - name: nodes_coordinate
    description: "Coordinate multiple agents working on related tasks with shared context, such as synchronizing analysis agents or orchestrating a parallel research effort"
    risk_level: medium

  # group:openclaw -- Built-in Management (CRITICAL risk)
  - name: openclaw_skill_install
    description: "Install a new skill from ClawHub or external source into the OpenClaw environment"
    risk_level: critical
  - name: openclaw_skill_execute
    description: "Execute an installed skill with specified parameters"
    risk_level: high
  - name: openclaw_config_modify
    description: "Modify agent configuration including sandbox mode, permissions, and tool access"
    risk_level: critical
  - name: openclaw_agent_create
    description: "Create a new agent instance with specified configuration and permissions"
    risk_level: high

constraints:
  max_chain_length: 20
  max_tool_calls_per_step: 5
  escalation_threshold: 0.50
  require_human_above_risk: high

# SetFit L1.5 boundary classifier -- domain-specific model trained on
# 331 OpenClaw scenarios (v2: benchmark + demo + O's real audit trail).
# v1: 171 scenarios, AUC 0.990. v2: 331 scenarios with real production data.
# See: research/setfit_openclaw_mve_closure.md
setfit:
  enabled: true
  model_dir: models/setfit_openclaw_v2
  threshold: 0.50
  asymmetric_override: true
  composite_boost: true  # D13 Intervention 3: SetFit legitimacy modulation in composite scoring

# Permission controller -- ESCALATE verdict notifications.
# When the governance engine returns ESCALATE, the permission controller
# notifies you and waits for an approve/deny decision. Approved overrides
# produce an Ed25519-signed receipt for EU AI Act Article 14 compliance.
#
# Channels:
#   Telegram -- interactive (Approve/Deny inline buttons). Create a bot
#     via @BotFather, get the token, then message the bot and use
#     https://api.telegram.org/bot<TOKEN>/getUpdates to find your chat_id.
#   WhatsApp -- interactive (Approve/Deny buttons via Cloud API). Set up a
#     Meta Business app at https://developers.facebook.com, configure a
#     WhatsApp phone number, and generate a permanent access token.
#     Requires a webhook endpoint for receiving button callbacks.
#   Discord -- notification only (v1). Create a webhook in channel settings
#     -> Integrations -> Webhooks. No interactive response (use Telegram,
#     WhatsApp, or CLI to approve/deny).
#
# notifications:
#   telegram_bot_token: "123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11"
#   telegram_chat_id: "987654321"
#   discord_webhook_url: "https://discord.com/api/webhooks/1234567890/abcdef..."
#   whatsapp_phone_number_id: "1234567890"
#   whatsapp_access_token: "EAAx..."
#   whatsapp_recipient_number: "+1234567890"
#   escalation_timeout_seconds: 300   # 5 minutes; deny if no response
#   timeout_action: "deny"            # "deny" (fail-closed) or "allow" (fail-open)
